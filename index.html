<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuenta atrás</title>

  <!-- Fuente Caveat -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #countdown {
      font-family: 'Caveat', cursive;
      font-size: 24px;
      color: #3a6680;
      text-align: center;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <div id="countdown">00:00:00:00</div>

  <script>
    function actualizarContador() {
      const fechaObjetivo = new Date("November 14, 2026 00:00:00").getTime();
      const ahora = new Date().getTime();
      const diferencia = fechaObjetivo - ahora;

      if (diferencia <= 0) {
        document.getElementById("countdown").innerHTML = "00:00:00:00";
        return;
      }

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
      const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
      const segundos = Math.floor((diferencia / 1000) % 60);

      // Formato tipo reloj (2 dígitos)
      const d = String(dias).padStart(2, '0');
      const h = String(horas).padStart(2, '0');
      const m = String(minutos).padStart(2, '0');
      const s = String(segundos).padStart(2, '0');

      document.getElementById("countdown").innerHTML = `${d}:${h}:${m}:${s}`;
    }

    // Actualiza cada segundo
    setInterval(actualizarContador, 1000);

    // Ejecutar inmediatamente al cargar
    actualizarContador();
  </script>

</body>
</html>
